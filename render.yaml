# Render Blueprint — free-tier deploy of the API on Render.
# Docs: https://render.com/docs/blueprint-spec
#
# Deploy: push this repo to GitHub, then in Render -> "New" -> "Blueprint" and
# point it at the repo. This provisions ONLY the web service — no Render
# managed Postgres, because Render's free Postgres plan auto-deletes the
# database after 30 days (not just suspends it), which isn't a real option
# for anything you want to keep. Use a permanently-free external Postgres
# instead — Neon (neon.tech) and Supabase both have a free tier with no
# expiry — and point SQL_HOST/etc at it below. Set SQL_SSL=true for either.
#
# AFTER first deploy, set the secrets marked `sync: false` in the service's
# Environment tab (they are intentionally NOT in this file):
#   - SQL_HOST / SQL_PORT / SQL_ADMIN_USER / SQL_ADMIN_PASSWORD / SQL_DB_NAME -> your Neon/Supabase connection details
#   - SQL_SSL              -> "true" for Neon/Supabase
#   - APP_BASE_URL         -> this service's public URL (e.g. https://smartteams-admin.onrender.com)
#   - SMTP_* or RESEND_*   -> email delivery credentials
#   - SEED_SUPER_ADMIN_*   -> optional; otherwise a random password is printed in logs on first boot
#   - GOOGLE_CLIENT_ID / VITE_GOOGLE_CLIENT_ID -> optional Google Sign-In

services:
  # --- Admin app: Express API + bundled React SPA (public) ------------------
  - type: web
    name: smartteams-admin
    runtime: docker
    dockerfilePath: ./apps/admin/Dockerfile
    dockerContext: .
    plan: free # spins down after 15min idle, cold start on next request — fine for a demo/low-traffic deploy
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      # JWT secret: generated once by Render and kept stable across deploys.
      - key: JWT_SECRET
        generateValue: true
      # External Postgres (Neon/Supabase free tier) — set after first deploy.
      - key: SQL_HOST
        sync: false
      - key: SQL_PORT
        sync: false
      - key: SQL_ADMIN_USER
        sync: false
      - key: SQL_ADMIN_PASSWORD
        sync: false
      - key: SQL_DB_NAME
        sync: false
      - key: SQL_SSL
        sync: false
      # Set these in the dashboard after first deploy (not stored in the repo).
      - key: APP_BASE_URL
        sync: false
      # Super admin bootstrap — Render will prompt you for these values.
      - key: SEED_SUPER_ADMIN_EMAIL
        sync: false
      - key: SEED_SUPER_ADMIN_PASSWORD
        sync: false
      - key: CORS_ALLOWED_ORIGINS
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: RESEND_FROM
        sync: false
      # SendGrid: the recommended email path on Render's free tier — outbound
      # SMTP (below) was confirmed fully blocked here (tested against Gmail
      # AND an unrelated test SMTP host, and across two different regions;
      # same "Connection timeout" every time), and Resend (above) requires a
      # verified domain this deployment didn't have. SendGrid's free tier
      # allows verifying a single sender EMAIL ADDRESS instead of a domain
      # (Settings > Sender Authentication > Single Sender Verification) —
      # SENDGRID_FROM must exactly match whatever address you verified there.
      - key: SENDGRID_API_KEY
        sync: false
      - key: SENDGRID_FROM
        sync: false
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        sync: false
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: SMTP_FROM
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: VITE_GOOGLE_CLIENT_ID
        sync: false
      # Face microservice (services/face-service) — only needed by tenants
      # that opt into the 'face_recognition' platform feature. Point this at
      # the smartteams-face service's public URL below (free tier has no
      # private networking between services, so this uses the public URL
      # like CORS_ALLOWED_ORIGINS already does for the frontend).
      - key: FACE_SERVICE_URL
        sync: false

  # --- Face service: InsightFace buffalo_s (detection + recognition + landmark_3d_68) ----
  # Optional — only deploy this if you're enabling face_recognition for any
  # tenant. Free tier is 0.1 shared vCPU + spins down after 15min idle, same
  # caveat as smartteams-admin above: the first request after idle (or after
  # a cold deploy) reloads the model and will be noticeably slow. See
  # services/face-service/README.md for the memory/latency tradeoffs.
  - type: web
    name: smartteams-face
    runtime: docker
    dockerfilePath: ./services/face-service/Dockerfile
    dockerContext: ./services/face-service
    plan: free
    healthCheckPath: /health
