name: CI

on:
  push:
    branches: [main, master]
  pull_request:

# Cancel superseded runs on the same branch/PR to save minutes.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    name: Lint, test & build (Node)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Reads the pnpm version from the "packageManager" field in package.json.
      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck (tsc --noEmit)
        run: pnpm lint

      - name: Unit tests
        run: pnpm test

      - name: Build
        run: pnpm build

      # Fails the build on known high/critical-severity vulnerabilities in
      # dependencies; low/moderate findings are common in transitive deps
      # and would make this too noisy to act on, so only the severities
      # worth blocking a merge over are enforced.
      - name: Dependency audit (high/critical)
        run: pnpm audit --audit-level=high

  docker-build-admin:
    name: Build admin Docker image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      # Build the deployable admin image to catch Dockerfile/bundle breakage.
      - name: Build admin image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/admin/Dockerfile
          push: false
          tags: smartteams-admin:ci
