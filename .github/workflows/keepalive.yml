name: keep-alive

# Prevents free-tier cold starts by keeping the services warm:
#   - Render web service (backend) spins down after ~15 min idle
#   - Neon Postgres suspends after ~5 min idle
#
# Hitting /api/health/db warms the backend AND runs a DB query (keeps Neon up).
#
# Setup: repo Settings -> Secrets and variables -> Actions -> Variables, add:
#   BACKEND_URL       e.g. https://your-backend.onrender.com
#
# NOTE: GitHub's scheduler is best-effort and can be delayed several minutes
# under load. For tighter, more reliable intervals use an external monitor
# (UptimeRobot / cron-job.org) pointed at the same two URLs.

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Warm backend + database (Render + Neon)
        run: |
          if [ -n "${{ vars.BACKEND_URL }}" ]; then
            curl -fsS --max-time 90 "${{ vars.BACKEND_URL }}/api/health/db" || echo "backend ping timed out (likely cold-starting)"
          else
            echo "BACKEND_URL variable not set — skipping"
          fi
