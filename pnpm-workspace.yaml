packages:
  - 'apps/admin'
  - 'packages/database'

# Allow esbuild to run its postinstall so its platform binary is set up.
# pnpm 10 blocks package build scripts by default; the admin production build
# (esbuild bundling server.ts) fails without this on a clean install — which is
# exactly what the Docker image build and CI do.
onlyBuiltDependencies:
  - esbuild
