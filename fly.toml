# Fly.io config for the admin app (Express API + bundled React SPA).
# Postgres is a separate Fly resource — see DEPLOYMENT.md for the full
# step-by-step (fly postgres create, and `fly secrets set` for the values below).
#
# Deploy:  fly launch --no-deploy   (first time, to create the app)
#          fly secrets set JWT_SECRET=... SQL_HOST=... SQL_ADMIN_PASSWORD=... (etc)
#          fly deploy

app = "smartteams-admin"   # must be globally unique — rename before first deploy
primary_region = "sin"     # pick a region near your users

[build]
  dockerfile = "apps/admin/Dockerfile"
  # Build context is this directory (repo root), which is what the admin
  # Dockerfile expects (it COPYs packages/database and apps/admin).

[env]
  NODE_ENV = "production"
  PORT = "3000"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

  [[http_service.checks]]
    interval = "15s"
    timeout = "5s"
    grace_period = "30s"
    method = "GET"
    path = "/api/health"

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"
